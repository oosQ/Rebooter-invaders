<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rebooter01 - Invaders</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="./static/style.css">
</head>

<body>
    <!-- Game Status Bar -->
    <nav class="navbar">
        <div class="stat-item">
            <i class="fa-solid fa-trophy stat-icon"></i>
            <div class="stat-content">
                <span class="stat-label">Score</span>
                <span class="stat-value result">0</span>
            </div>
        </div>

        <div class="stat-item">
            <i class="fa-solid fa-clock stat-icon"></i>
            <div class="stat-content">
                <span class="stat-label">Time</span>
                <span class="stat-value timer">60</span>
            </div>
        </div>

        <div class="stat-item">
            <i class="fa-solid fa-ranking-star stat-icon"></i>
            <div class="stat-content">
                <span class="stat-label">Level</span>
                <span class="stat-value level">1</span>
            </div>
        </div>

        <div class="stat-item">
            <i class="fa-solid fa-heart stat-icon lives-icon"></i>
            <div class="stat-content">
                <span class="stat-label">Lives</span>
                <span class="stat-value lives">3</span>
            </div>
        </div>

        <div class="stat-item">
            <i class="fa-solid fa-gauge-high stat-icon"></i>
            <div class="stat-content">
                <span class="stat-label">FPS</span>
                <span class="stat-value fps-display">0</span>
            </div>
        </div>
    </nav>

    <!-- Grid Container -->
    <div class="game-container">
        <div class="grid"></div>
    </div>

    <!-- Story Mode Selection Pop-up -->
    <div id="storyModePopup" class="game-popup">
        <div class="popup-content">
            <h2> Rebooter01 - Invaders </h2>
            <p>Choose your game mode:</p>
            <div class="buttons">
                <button id="storyModeBtn" class="back-menu-btn"><i class="fa-solid fa-book"></i> Story Mode</button>
                <button id="classicModeBtn" class="back-menu-btn"><i class="fa-solid fa-gamepad"></i> Classic
                    Mode</button>
            </div>
        </div>
    </div>

    <!-- Story Pop-up -->
    <div id="storyPopup" class="game-popup">
        <div class="popup-content">
            <h2 id="storyTitle">Story</h2>
            <p id="storyMessage"></p>
            <button id="storyContinueBtn" class="back-menu-btn">Continue</button>
        </div>
    </div>

    <!-- Pause Menu Pop-up -->
    <div id="gamePopup" class="game-popup">
        <div class="popup-content">
            <div>
                <h2 id="popupTitle">Game Paused</h2>
                <p id="popupMessage"></p>
                <div class="buttons">
                    <button id="resumeBtn" class="back-menu-btn"><i class="fa-solid fa-play"></i> Resume</button>
                    <button id="restartBtn" class="back-menu-btn"><i class="fa-solid fa-rotate"></i> Restart</button>
                </div>
                <button id="backToMenuBtn" class="back-menu-btn"><i class="fa-solid fa-home"></i> Main Menu</button>
            </div>
        </div>
    </div>

    <!-- Scoreboard Modal -->
    <div id="scoreboardModal" class="game-popup" style="display: none;">
        <div class="popup-content scoreboard-content">
            <h2>Scoreboard</h2>
            <div class="scoreboard-container">
                <table class="scoreboard-table">
                    <thead>
                        <tr>
                            <th>Rank</th>
                            <th>Name</th>
                            <th>Score</th>
                            <th>Time</th>
                        </tr>
                    </thead>
                    <tbody id="scoreboardBody">
                        <!-- Scores will be inserted here -->
                    </tbody>
                </table>
            </div>

            <div class="pagination-controls">
                <button id="prevPageBtn" class="page-btn"><i class="fa-solid fa-chevron-left"></i></button>
                <span id="pageInfo">Page 1/1</span>
                <button id="nextPageBtn" class="page-btn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>

            <div class="scoreboard-buttons">
                <button id="scoreboardRestartBtn" class="back-menu-btn"><i class="fa-solid fa-rotate"></i> Play
                    Again</button>
                <button id="scoreboardMenuBtn" class="back-menu-btn"><i class="fa-solid fa-home"></i> Main Menu</button>
            </div>
        </div>
    </div>

    <script type="module" src="./js/main.js"></script>
    <script type="module">
        import { eventListeners } from './js/controls.js';
        // Initialize game event listeners after all modules are loaded
        eventListeners("game");
    </script>
</body>

</html>
